<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peptide Hackers - Review Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 1.5rem;
      color: #1a1a1a;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .review-box {
      margin-top: 24px;
      padding: 20px;
      background: #f8fafc;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      min-height: 100px;
      display: none;
    }
    .review-box.show { display: block; }
    .review-text {
      color: #334155;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .copy-btn {
      margin-top: 12px;
      padding: 10px;
      background: #10b981;
      font-size: 0.875rem;
    }
    .copy-btn:hover { background: #059669; }
    .links {
      margin-top: 30px;
      display: flex;
      gap: 12px;
    }
    .links a {
      flex: 1;
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .links a:hover { opacity: 0.9; }
    .google { background: #4285f4; color: #fff; }
    .yelp { background: #d32323; color: #fff; }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Peptide Hackers</h1>
    <p class="subtitle">Generate a review, then post it</p>

    <button id="generateBtn" onclick="generateReview()">Generate Review</button>

    <div class="review-box" id="reviewBox">
      <p class="review-text" id="reviewText"></p>
      <button class="copy-btn" onclick="copyReview()">Copy to Clipboard</button>
    </div>

    <div class="links">
      <a href="https://g.page/r/CX2_UZjKVSO7EAE/review" target="_blank" class="google">Leave Google Review</a>
      <a href="https://www.yelp.com/biz/peptide-hackers-los-angeles-7" target="_blank" class="yelp">Leave Yelp Review</a>
    </div>
  </div>

  <script>
    const API_KEY = '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';
    const MODEL = 'liquid/lfm-2.5-1.2b-instruct:free';

    async function generateReview() {
      const btn = document.getElementById('generateBtn');
      const box = document.getElementById('reviewBox');
      const text = document.getElementById('reviewText');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Generating...';

      try {
        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`,
            'HTTP-Referer': window.location.href
          },
          body: JSON.stringify({
            model: MODEL,
            messages: [{
              role: 'user',
              content: `Write a short, authentic 5-star review for Peptide Hackers, a peptide therapy clinic in Los Angeles. The review should sound natural and personal, mentioning things like quality service, knowledgeable staff, or positive health outcomes. Keep it 2-4 sentences. Do not use quotation marks. Just write the review text directly.`
            }],
            max_tokens: 200,
            temperature: 0.9
          })
        });

        const data = await response.json();
        const review = data.choices[0].message.content.trim();

        text.textContent = review;
        box.classList.add('show');
      } catch (err) {
        text.textContent = 'Error generating review. Please try again.';
        box.classList.add('show');
      }

      btn.disabled = false;
      btn.textContent = 'Generate Another';
    }

    function copyReview() {
      const text = document.getElementById('reviewText').textContent;
      navigator.clipboard.writeText(text);
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
    }
  </script>
</body>
</html>
